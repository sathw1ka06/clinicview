name: cliniview_new
description: "Cliniview frontend for clinical image review workflows."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  go_router: ^14.0.1
  photo_view: ^0.15.0
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.0
  google_fonts: ^6.1.0
  intl: ^0.20.2
  http: ^1.6.0
  flutter_dotenv: ^6.0.1
  camera: ^0.12.0+1
  url_launcher: ^6.3.2
  pdf: ^3.12.0
  printing: ^5.14.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/images/