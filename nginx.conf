server {
    listen 80;
    server_name localhost;
    
    # Where Nginx will look for your Flutter files
    root /usr/share/nginx/html;
    index index.html;

    # THIS IS CRITICAL FOR GO_ROUTER:
    # It tells Nginx: "If you can't find a file at this path, just load index.html"
    # This prevents 404 errors when users refresh on specific routes.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional but highly recommended: Cache static assets to make the app load instantly on return visits
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
        add_header Cache-Control "public, no-transform";
    }
}